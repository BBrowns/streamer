name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Type Check Server
        run: npx tsc --noEmit --project server/tsconfig.json
      - name: Type Check Shared
        run: npx tsc --noEmit --project packages/shared/tsconfig.json

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Check formatting
        run: npm run format:check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true
      - name: Scan for secrets in staged files
        run: |
          # Check for common secret patterns in tracked files
          if git grep -rIl '(PRIVATE_KEY|password\s*=\s*["\x27]|api_key\s*=)' -- ':!*.test.*' ':!*.md' ':!*.yml' ':!*.lock' 2>/dev/null; then
            echo "⚠️ Potential secrets found in tracked files"
            exit 1
          fi
          echo "✅ No secrets detected"

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, format-check]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: streamer
          POSTGRES_PASSWORD: streamer_dev
          POSTGRES_DB: streamer_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://streamer:streamer_dev@localhost:5432/streamer_db?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Push DB Schema
        run: npx prisma db push --schema=server/prisma/schema.prisma
      - name: Force Install Missing Native/Coverage Dependencies
        run: npm install @rollup/rollup-linux-x64-gnu @vitest/coverage-v8@3.2.4
      - name: Run Tests with Coverage
        run: npm run test --workspace=server -- --coverage
        env:
          LOG_LEVEL: silent
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 14

  test-stream-server:
    name: Stream Server Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Type Check Stream Server
        run: npx tsc --noEmit --project packages/stream-server/tsconfig.json

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Build Shared
        run: npx tsc --project packages/shared/tsconfig.json
      - name: Build Server
        run: npx tsc --project server/tsconfig.json
