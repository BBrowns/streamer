name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?schema=public

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Lint All Workspaces
        run: npm run lint
      - name: Type Check All Workspaces
        run: npm run typecheck:all

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Check formatting
        run: npm run format:check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true
      - name: Scan for secrets in staged files
        run: |
          # Check for common secret patterns in tracked files
          if git grep -rIl '(PRIVATE_KEY|password\s*=\s*["\x27]|api_key\s*=)' -- ':!*.test.*' ':!*.md' ':!*.yml' ':!*.lock' 2>/dev/null; then
            echo "⚠️ Potential secrets found in tracked files"
            exit 1
          fi
          echo "✅ No secrets detected"

  test-shared:
    name: Shared Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Run Shared Tests
        run: npm run test --workspace=@streamer/shared
      - name: Write CI summary
        if: always()
        run: |
          mkdir -p artifacts/ci-summaries
          cat > artifacts/ci-summaries/shared-tests.md <<'EOF'
          # Shared Tests

          - Status: ${{ job.status }}
          - Command: `npm run test --workspace=@streamer/shared`
          - Scope: shared schemas, playback fixtures, build metadata, and observability helpers.
          EOF
      - name: Upload CI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-shared-tests
          path: artifacts/ci-summaries/shared-tests.md
          retention-days: 14

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, format-check]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: streamer
          POSTGRES_PASSWORD: streamer_dev
          POSTGRES_DB: streamer_db
        ports:
          - 5432:5432
        # Wait for postgres to be ready
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://streamer:streamer_dev@localhost:5432/streamer_db?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Push DB Schema
        run: npx prisma db push --schema=server/prisma/schema.prisma
      - name: Force Install Missing Native/Coverage Dependencies
        run: npm install @rollup/rollup-linux-x64-gnu @vitest/coverage-v8@4.1.0
      - name: Run Tests with Coverage
        run: npm run test --workspace=server -- --coverage
        env:
          LOG_LEVEL: silent
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: server-coverage
          path: server/coverage/
          retention-days: 14
      - name: Coverage summary comment
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          working-directory: server
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
      - name: Write CI summary
        if: always()
        run: |
          mkdir -p artifacts/ci-summaries
          cat > artifacts/ci-summaries/server-tests.md <<'EOF'
          # Server Tests

          - Status: ${{ job.status }}
          - Command: `npm run test --workspace=server -- --coverage`
          - Scope: API, auth, planner, add-on security, redaction, Sentry, and database-backed integration tests.
          - Artifact: `server-coverage`
          EOF
      - name: Upload CI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-server-tests
          path: artifacts/ci-summaries/server-tests.md
          retention-days: 14

  test-stream-server:
    name: Stream Server Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Type Check Stream Server
        run: npx tsc --noEmit --project packages/stream-server/tsconfig.json
      - name: Run Stream Server Tests
        run: npm run test --workspace=@streamer/stream-server
      - name: Write CI summary
        if: always()
        run: |
          mkdir -p artifacts/ci-summaries
          cat > artifacts/ci-summaries/stream-server-tests.md <<'EOF'
          # Stream Server Tests

          - Status: ${{ job.status }}
          - Commands: `npx tsc --noEmit --project packages/stream-server/tsconfig.json`, `npm run test --workspace=@streamer/stream-server`
          - Scope: bridge health, gateway, range/seek, torrent engine diagnostics, security, Sentry, and subtitle handling.
          EOF
      - name: Upload CI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-stream-server-tests
          path: artifacts/ci-summaries/stream-server-tests.md
          retention-days: 14

  test-mobile:
    name: Mobile Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Type Check Mobile
        run: npx tsc --noEmit --project apps/mobile/tsconfig.json
      - name: Run Mobile Jest Tests
        run: npm run test --workspace=apps/mobile -- --runInBand
      - name: Write CI summary
        if: always()
        run: |
          mkdir -p artifacts/ci-summaries
          cat > artifacts/ci-summaries/mobile-tests.md <<'EOF'
          # Mobile Tests

          - Status: ${{ job.status }}
          - Commands: `npx tsc --noEmit --project apps/mobile/tsconfig.json`, `npm run test --workspace=apps/mobile -- --runInBand`
          - Scope: Play Best sessions, downloads, cast, bridge diagnostics, UI units, stores, and redaction.
          EOF
      - name: Upload CI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-mobile-tests
          path: artifacts/ci-summaries/mobile-tests.md
          retention-days: 14

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Build Shared
        run: npx tsc --project packages/shared/tsconfig.json
      - name: Build Server
        run: npx tsc --project server/tsconfig.json
      - name: Build Stream Server Sidecar
        run: npm run build --workspace=@streamer/stream-server
      - name: Build Desktop Main Process
        run: npm run build --workspace=@streamer/desktop
      - name: Run Desktop Security Tests
        run: npm run test --workspace=@streamer/desktop
      - name: Vendor Desktop Node Runtimes
        run: npm run vendor --workspace=@streamer/desktop
      - name: Desktop Package Input Smoke
        run: npm run package:check --workspace=@streamer/desktop
      - name: Validate Sentry Release Workflow
        run: npm run sentry:release:dry-run
        env:
          STREAMER_GIT_SHA: ${{ github.sha }}
          STREAMER_BUILD_ENVIRONMENT: test
      - name: Upload Sentry Release Artifacts
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: npm run sentry:release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          STREAMER_GIT_SHA: ${{ github.sha }}
          STREAMER_BUILD_DATE: ${{ github.event.head_commit.timestamp }}
          STREAMER_BUILD_ENVIRONMENT: production
      - name: Write CI summary
        if: always()
        run: |
          mkdir -p artifacts/ci-summaries
          cat > artifacts/ci-summaries/build-check.md <<'EOF'
          # Build Check

          - Status: ${{ job.status }}
          - Scope: shared build, server build, stream-server sidecar build, desktop main build/tests, vendor Node runtimes, desktop package inputs, and Sentry release dry-run.
          EOF
      - name: Upload CI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-build-check
          path: artifacts/ci-summaries/build-check.md
          retention-days: 14

  desktop-package:
    name: Desktop Package Artifact
    runs-on: macos-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm install --no-audit --no-fund
      - name: Build macOS desktop package directory
        run: npm run package:mac --workspace=@streamer/desktop
      - name: Validate packaged inputs
        run: npm run package:check --workspace=@streamer/desktop
      - name: Upload desktop package artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-package-dir
          path: apps/desktop/release/**
          if-no-files-found: error
          retention-days: 14
      - name: Write CI summary
        if: always()
        run: |
          mkdir -p artifacts/ci-summaries
          cat > artifacts/ci-summaries/desktop-package.md <<'EOF'
          # Desktop Package Artifact

          - Status: ${{ job.status }}
          - Command: `npm run package:mac --workspace=@streamer/desktop`
          - Artifact: `desktop-macos-package-dir`
          - Scope: unsigned macOS Electron package directory with stream-server sidecar resources.
          EOF
      - name: Upload CI summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-desktop-package
          path: artifacts/ci-summaries/desktop-package.md
          retention-days: 14

  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-and-typecheck
      - format-check
      - security-audit
      - test-shared
      - test-server
      - test-stream-server
      - test-mobile
      - build-check
      - desktop-package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Run release gate
        run: npm run release:gate
      - name: Upload release gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary-release-gate
          path: artifacts/ci-summaries/release-gate.md
          retention-days: 14
