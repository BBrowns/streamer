name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Type Check Server
        run: npx tsc --noEmit --project server/tsconfig.json
      - name: Type Check Shared
        run: npx tsc --noEmit --project packages/shared/tsconfig.json

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: streamer
          POSTGRES_PASSWORD: streamer_dev
          POSTGRES_DB: streamer_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://streamer:streamer_dev@localhost:5432/streamer_db?schema=public
      JWT_SECRET: ci-test-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Push DB Schema
        run: npx prisma db push --schema=server/prisma/schema.prisma --skip-generate
      - name: Run Tests
        run: npm run test --workspace=server
        env:
          LOG_LEVEL: silent

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate --schema=server/prisma/schema.prisma
      - name: Build Shared
        run: npx tsc --project packages/shared/tsconfig.json
      - name: Build Server
        run: npx tsc --project server/tsconfig.json
